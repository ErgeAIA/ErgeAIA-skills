name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'changelog-manager/**'
      - 'skill-reviewer/**'
      - 'CHANGELOG.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from CHANGELOG.md
        id: version
        run: |
          version=$(grep -m1 -oE '## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build changelog-manager
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          zip -r changelog-manager.zip changelog-manager -x "*.DS_Store"

      - name: Build skill-reviewer
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          zip -r skill-reviewer.zip skill-reviewer -x "*.DS_Store"

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Download Skills

            | Skill | Version | Download |
            |-------|---------|----------|
            | changelog-manager | ${{ steps.version.outputs.version }} | [changelog-manager.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/changelog-manager.zip) |
            | skill-reviewer | ${{ steps.version.outputs.version }} | [skill-reviewer.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/skill-reviewer.zip) |
          files: |
            changelog-manager.zip
            skill-reviewer.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
